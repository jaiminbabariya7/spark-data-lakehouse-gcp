version: "3.8"

services:
  spark-master:
    image: bitnami/spark:3.5
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ../jobs:/opt/spark-apps
      - spark-data:/opt/spark-data

  spark-worker-1:
    image: bitnami/spark:3.5
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    depends_on: [spark-master]
    volumes:
      - ../jobs:/opt/spark-apps
      - spark-data:/opt/spark-data

  spark-worker-2:
    image: bitnami/spark:3.5
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    depends_on: [spark-master]
    volumes:
      - ../jobs:/opt/spark-apps
      - spark-data:/opt/spark-data

  spark-history:
    image: bitnami/spark:3.5
    command: /opt/bitnami/spark/sbin/start-history-server.sh
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=/opt/spark-data/event-logs
    ports:
      - "18080:18080"
    volumes:
      - spark-data:/opt/spark-data

volumes:
  spark-data: